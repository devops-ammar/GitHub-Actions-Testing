name: MERN CI/CD with Docker & GHCR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      #- name: Lint backend
      #  run: npx eslint .
      #  working-directory: ./backend

      - name: Run backend tests
        run: npm test || echo "No tests, skipping"
        working-directory: ./backend

  frontend:
    runs-on: ubuntu-latest
    # needs: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      #- name: Lint frontend
      #  run: npx eslint .
      #  working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Login to GHCR ---
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # --- Build Docker images ---
      - name: Build backend Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/mern-backend:latest ./backend

      - name: Build frontend Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/mern-frontend:latest ./frontend

      # --- Push Docker images to GHCR ---
      - name: Push backend Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/mern-backend:latest

      - name: Push frontend Docker image
        run: docker push ghcr.io/${{ github.repository_owner }}/mern-frontend:latest

      # --- Optional: Deploy backend to Railway ---
      # - name: Install Railway CLI
      #   run: |
          # bash <(curl -fsSL cli.new)
          # npm install -g @railway/cli

      # - name: Deploy backend to Railway
